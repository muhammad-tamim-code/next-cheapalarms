<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0C2D44" />
  <title>Design my Ajax system — Safeguard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --sg-navy: #0C2D44;
      --sg-blue: #1769A1;
      --sg-blue-dark: #125882;
      --sg-orange: #FB7523;
      --sg-orange-deep: #EA7914;
      --sg-wash: #EAF3F9;
      --sg-wash-deep: #DBEAF4;
      --sg-ink: #1E2A33;
      --sg-muted: #5A6B77;
      --sg-faint: #93A4B0;
      --sg-line: #DCE6EE;
      --sg-white: #ffffff;
      --sg-success: #1F9D57;
      --sg-success-soft: #e8f7ee;
      --font-head: "Chakra Petch", ui-sans-serif, sans-serif;
      --font-body: "Inter", system-ui, sans-serif;
      --gutter: 18px;
      --max: 480px;
      --r-lg: 0;
      --r: 0;
      --r-sm: 0;
      --sh-sm: 0 1px 2px rgba(12,45,68,.06), 0 4px 14px -8px rgba(12,45,68,.14);
      --sh: 0 6px 24px -10px rgba(12,45,68,.22);
      --sh-pop: 0 18px 50px -20px rgba(12,45,68,.5);
      --footer-h: 76px;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html {
      -webkit-text-size-adjust: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      margin: 0;
      height: 100%;
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.5;
      color: var(--sg-ink);
      background: var(--sg-white);
      overflow: hidden;
    }
    :focus-visible { outline: 2px solid var(--sg-blue); outline-offset: 2px; }

    /* Flex shell: header + progress pinned, main scrolls, footer always visible */
    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: var(--max);
      margin: 0 auto;
      width: 100%;
      overflow: hidden;
      background: var(--sg-white);
    }
    .app > .header,
    .app > .progress-wrap,
    .app > .resume,
    .app > .footer { flex-shrink: 0; }

    /* Header */
    .header {
      z-index: 20;
      background: var(--sg-white);
      border-bottom: 1px solid var(--sg-line);
      padding: 11px var(--gutter);
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .logo { display: flex; align-items: center; text-decoration: none; min-width: 0; }
    .logo-img { height: 30px; width: auto; max-width: 150px; object-fit: contain; display: block; }
    .logo-fb { display: flex; align-items: center; gap: 9px; }
    .logo-fb .mk { width: 30px; height: 34px; flex-shrink: 0; }
    .logo-fb .tx { line-height: 1.04; }
    .logo-fb .tx b { font-family: var(--font-head); font-size: 15px; font-weight: 700; color: var(--sg-navy); letter-spacing: .01em; }
    .logo-fb .tx small { display: block; font-size: 8px; font-weight: 600; letter-spacing: .2em; color: var(--sg-orange); text-transform: uppercase; }
    .header-phone { display: flex; align-items: center; gap: 8px; text-decoration: none; color: inherit; flex-shrink: 0; }
    .header-phone .ph-ic { width: 30px; height: 30px; border-radius: 50%; background: var(--sg-wash); color: var(--sg-blue); display: grid; place-items: center; }
    .header-phone .ph-ic svg { width: 15px; height: 15px; }
    .header-phone .ph-tx { text-align: left; }
    .header-phone small { display: block; font-size: 9.5px; color: var(--sg-muted); }
    .header-phone strong { font-size: 13px; color: var(--sg-navy); font-weight: 700; white-space: nowrap; }
    @media (max-width: 360px) { .header-phone .ph-tx { display: none; } }

    /* Progress */
    .progress-wrap { padding: 14px var(--gutter) 0; }
    .progress-meta { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 9px; }
    .progress-meta .step-name {
      font-family: var(--font-head); font-weight: 700; color: var(--sg-navy);
      text-transform: uppercase; letter-spacing: 0.07em; font-size: 12px;
    }
    .progress-meta #prog-step { font-size: 11px; color: var(--sg-faint); font-weight: 500; letter-spacing: .04em; }
    .progress-bar { height: 5px; background: var(--sg-line); overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--sg-blue), #2a8fc9); transition: width 0.4s cubic-bezier(.4,0,.2,1); }

    /* Resume */
    .resume { padding: 12px var(--gutter) 0; }
    .resume-bar {
      display: flex; align-items: center; gap: 9px;
      background: var(--sg-success-soft); border: 1px solid #cde8d2; border-radius: var(--r-sm);
      padding: 10px 13px; font-size: 13px; color: #1d6b35;
    }
    .resume-bar .rc { color: var(--sg-success); display: grid; place-items: center; }
    .resume-bar button {
      margin-left: auto; background: none; border: none; font-family: var(--font-body);
      font-size: 12px; font-weight: 700; color: var(--sg-navy); text-decoration: underline; cursor: pointer;
    }

    /* Main — only scrollable region */
    .main {
      flex: 1 1 auto;
      min-height: 0;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 18px var(--gutter) 20px;
    }
    .view { animation: rise .34s cubic-bezier(.2,.7,.3,1) both; }
    @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    .main h1 {
      margin: 0 0 6px; font-family: var(--font-head); font-size: 1.5rem; font-weight: 700;
      color: var(--sg-navy); line-height: 1.18; letter-spacing: -0.01em;
    }
    .lead { margin: 0 0 18px; font-size: 0.9rem; color: var(--sg-muted); }
    .stack { display: flex; flex-direction: column; gap: 11px; }

    /* Choice cards */
    .choice {
      display: flex; align-items: center; gap: 13px; width: 100%;
      padding: 15px; border: 1.5px solid var(--sg-line); border-radius: var(--r);
      background: var(--sg-white); box-shadow: var(--sh-sm); text-align: left; cursor: pointer;
      font-family: inherit; color: inherit; -webkit-tap-highlight-color: transparent;
      transition: border-color .15s, background .15s, box-shadow .15s, transform .08s;
    }
    .choice:hover { border-color: #b9d0e0; }
    .choice:active { transform: scale(.99); }
    .choice.selected { border-color: var(--sg-blue); background: var(--sg-wash); box-shadow: 0 0 0 3px rgba(23,105,161,.14), var(--sh-sm); }
    .choice-icon {
      width: 46px; height: 46px; background: var(--sg-wash);
      display: grid; place-items: center; flex-shrink: 0; color: var(--sg-blue); transition: background .15s, color .15s;
    }
    .choice.selected .choice-icon { background: var(--sg-blue); color: #fff; }
    .choice-icon svg { width: 23px; height: 23px; }
    .choice-body { flex: 1; min-width: 0; }
    .choice-body strong { display: block; font-size: 0.97rem; font-weight: 700; color: var(--sg-navy); }
    .choice-body p { margin: 2px 0 0; font-size: 0.82rem; color: var(--sg-muted); }
    .choice-go { flex-shrink: 0; width: 24px; height: 24px; display: grid; place-items: center; color: var(--sg-faint); }
    .choice-go svg { width: 18px; height: 18px; }
    .choice.selected .choice-go { width: 24px; height: 24px; border-radius: 50%; background: var(--sg-blue); color: #fff; }
    .choice.selected .choice-go .chev { display: none; }
    .choice-go .tick { display: none; }
    .choice.selected .choice-go .tick { display: block; }

    /* Field cards (steppers / toggles) */
    .field-card, .toggle-row {
      display: flex; align-items: center; gap: 13px; padding: 14px 15px;
      border: 1.5px solid var(--sg-line); border-radius: var(--r); background: var(--sg-white);
      box-shadow: var(--sh-sm); margin-bottom: 11px;
    }
    .toggle-row { cursor: pointer; }
    .field-icon {
      width: 44px; height: 44px; background: var(--sg-wash);
      display: grid; place-items: center; flex-shrink: 0; color: var(--sg-blue);
    }
    .field-icon svg { width: 22px; height: 22px; }
    .field-text { flex: 1; min-width: 0; }
    .field-text label { display: block; font-weight: 700; font-size: 0.95rem; color: var(--sg-navy); }
    .field-text .sub { font-size: 0.81rem; color: var(--sg-muted); margin-top: 1px; }

    .stepper { display: flex; align-items: center; flex-shrink: 0; border: 1.5px solid var(--sg-line); border-radius: var(--r-sm); overflow: hidden; }
    .stepper button {
      width: 42px; height: 44px; border: none; background: var(--sg-white);
      font-size: 1.3rem; cursor: pointer; color: var(--sg-navy); transition: background .12s;
    }
    .stepper button:active { background: var(--sg-wash); }
    .stepper button:disabled { color: #c4d2dc; cursor: not-allowed; }
    .stepper .num {
      width: 40px; text-align: center; font-family: var(--font-head); font-size: 1.05rem;
      font-weight: 700; color: var(--sg-navy); border-left: 1.5px solid var(--sg-line);
      border-right: 1.5px solid var(--sg-line); height: 44px; line-height: 44px;
    }

    .switch { position: relative; width: 50px; height: 28px; flex-shrink: 0; pointer-events: none; }
    .switch input { opacity: 0; width: 0; height: 0; position: absolute; }
    .switch .track { position: absolute; inset: 0; background: var(--sg-line); transition: background .2s; }
    .switch input:checked + .track { background: var(--sg-blue); }
    .switch .thumb { position: absolute; width: 22px; height: 22px; left: 3px; top: 3px; background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.25); transition: transform .2s; }
    .switch input:checked ~ .thumb { transform: translateX(22px); }

    /* Review / kit editor */
    .cat-label {
      display: flex; align-items: center; gap: 9px;
      font-family: var(--font-head); font-size: 13px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--sg-navy); margin: 24px 0 11px;
    }
    .cat-label::before { content: ""; width: 4px; height: 15px; background: var(--sg-orange); flex-shrink: 0; }
    .cat-label:first-of-type { margin-top: 8px; }
    .kit-block { border: 1.5px solid var(--sg-line); border-radius: var(--r); background: #fff; box-shadow: var(--sh-sm); overflow: hidden; margin-bottom: 10px; }
    .kit-item { padding: 13px 15px; border-bottom: 1px solid var(--sg-line); }
    .kit-item:last-child { border-bottom: none; }
    .kit-item-top { display: flex; gap: 12px; align-items: flex-start; }
    .kit-thumb { width: 46px; height: 46px; background: var(--sg-wash); display: grid; place-items: center; flex-shrink: 0; color: var(--sg-blue); }
    .kit-thumb svg { width: 22px; height: 22px; }
    .kit-name { flex: 1; min-width: 0; }
    .kit-name strong { display: block; font-size: 0.9rem; font-weight: 700; color: var(--sg-navy); }
    .kit-name span { font-size: 0.77rem; color: var(--sg-muted); }
    .colour-dots { display: flex; gap: 7px; margin-top: 9px; }
    .colour-dot { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid #c4d2dc; cursor: pointer; }
    .colour-dot.white { background: #fff; }
    .colour-dot.black { background: #23282e; border-color: #23282e; }
    .colour-dot.sel { box-shadow: 0 0 0 2px var(--sg-white), 0 0 0 3.5px var(--sg-blue); }
    .kit-item-bot { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; gap: 8px; }
    .btn-text { background: none; border: none; padding: 0; font-family: var(--font-body); font-size: 0.82rem; font-weight: 700; color: var(--sg-blue); cursor: pointer; }
    .inc-chip { display: inline-flex; align-items: center; gap: 4px; font-size: 0.72rem; font-weight: 700; color: var(--sg-success); background: var(--sg-success-soft); padding: 3px 9px; }
    .btn-del { background: none; border: none; color: var(--sg-faint); cursor: pointer; padding: 4px; flex-shrink: 0; }
    .btn-del:hover { color: var(--sg-orange-deep); }
    .btn-del svg { width: 18px; height: 18px; }
    .qty-fixed { font-family: var(--font-head); font-weight: 700; font-size: 0.95rem; color: var(--sg-navy); background: var(--sg-wash); padding: 3px 12px; }
    .btn-add {
      width: 100%; padding: 13px; border: 1.5px dashed #b9d0e0; border-radius: var(--r); background: var(--sg-white);
      color: var(--sg-blue); font-family: var(--font-head); font-size: 0.84rem; font-weight: 700; cursor: pointer; margin-bottom: 6px;
      transition: background .15s, border-color .15s;
    }
    .btn-add:hover { background: var(--sg-wash); border-color: var(--sg-blue); }
    .note-box {
      display: flex; gap: 11px; align-items: flex-start; margin-top: 16px; padding: 14px 15px;
      background: var(--sg-wash); border: 1px solid var(--sg-wash-deep); border-radius: var(--r);
      font-size: 0.83rem; color: #1b4a6b; line-height: 1.5;
    }
    .note-box .ni { color: var(--sg-blue); flex-shrink: 0; margin-top: 1px; }
    .note-box strong { color: var(--sg-navy); }

    /* Form */
    .form-field { margin-bottom: 14px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-field label { display: block; font-size: 0.82rem; font-weight: 700; color: var(--sg-navy); margin-bottom: 6px; }
    .form-field input {
      width: 100%; height: 50px; padding: 0 14px; border: 1.5px solid var(--sg-line);
      border-radius: var(--r-sm); font-size: 16px; font-family: inherit; background: #fff; transition: border-color .15s, box-shadow .15s;
    }
    .form-field input:focus { outline: none; border-color: var(--sg-blue); box-shadow: 0 0 0 3px rgba(23,105,161,.14); }
    .form-field input.bad { border-color: var(--sg-orange); box-shadow: 0 0 0 3px rgba(251,117,35,.16); }
    .form-err { color: var(--sg-orange-deep); font-size: 0.75rem; margin-top: 5px; font-weight: 600; }
    .consent { display: flex; gap: 10px; font-size: 0.83rem; color: var(--sg-muted); margin-top: 8px; cursor: pointer; }
    .consent input { width: 19px; height: 19px; margin-top: 1px; accent-color: var(--sg-blue); flex-shrink: 0; }

    /* Success */
    .success { text-align: center; padding: 28px 4px; }
    .success-icon { width: 76px; height: 76px; margin: 0 auto 20px; background: var(--sg-success-soft); color: var(--sg-success); border-radius: 50%; display: grid; place-items: center; animation: pop .5s cubic-bezier(.2,1.5,.4,1) both; }
    @keyframes pop { from { transform: scale(.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .success-icon svg { width: 38px; height: 38px; }
    .success h1 { text-align: center; }
    .success .lead { text-align: center; margin-inline: auto; max-width: 32ch; }
    .success-card { text-align: left; border: 1.5px solid var(--sg-line); border-radius: var(--r); box-shadow: var(--sh-sm); padding: 18px; margin-top: 22px; }
    .success-card h2 { margin: 0 0 12px; font-family: var(--font-head); font-size: 11px; text-transform: uppercase; letter-spacing: 0.09em; color: var(--sg-muted); }
    .success-card ol { margin: 0; padding-left: 20px; font-size: 0.88rem; color: var(--sg-ink); }
    .success-card li + li { margin-top: 9px; }
    .btn-link { margin-top: 22px; background: none; border: none; color: var(--sg-blue); font-weight: 700; font-family: inherit; cursor: pointer; text-decoration: underline; }

    /* Footer — in flex flow, always visible at bottom of viewport */
    .footer {
      z-index: 30;
      background: var(--sg-white);
      border-top: 1px solid var(--sg-line);
      padding: 10px var(--gutter) calc(10px + env(safe-area-inset-bottom, 0px));
    }
    .footer-inner { max-width: 100%; margin: 0 auto; display: flex; align-items: center; gap: 10px; }
    .btn { height: 48px; border: none; border-radius: var(--r); font-family: var(--font-head); font-size: 0.92rem; font-weight: 700; letter-spacing: 0.03em; cursor: pointer; transition: filter .15s, background .15s; }
    .btn:active { opacity: 0.92; }
    .btn-back { min-width: 88px; background: var(--sg-white); border: 1.5px solid var(--sg-line); color: var(--sg-navy); }
    .btn-back:active { background: var(--sg-wash); }
    .btn-next { flex: 1; background: var(--sg-orange); color: var(--sg-white); box-shadow: none; }
    .btn-next:hover { filter: brightness(1.05); }
    .btn-next:disabled { background: #f6c4a3; cursor: not-allowed; filter: none; }

    /* Sheet modal */
    .sheet-bg { position: fixed; inset: 0; background: rgba(12,45,68,.5); z-index: 100; display: flex; align-items: flex-end; justify-content: center; animation: fade .2s ease; }
    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
    @media (min-width: 520px) { .sheet-bg { align-items: center; } }
    .sheet { background: var(--sg-white); width: 100%; max-width: var(--max); max-height: 86vh; overflow-y: auto; border-radius: var(--r-lg) var(--r-lg) 0 0; padding: 8px 16px calc(16px + env(safe-area-inset-bottom)); box-shadow: var(--sh-pop); animation: slideup .3s cubic-bezier(.2,1,.3,1); }
    @keyframes slideup { from { transform: translateY(50px); opacity: .5; } to { transform: none; opacity: 1; } }
    @media (min-width: 520px) { .sheet { border-radius: var(--r-lg); } }
    .sheet-handle { width: 40px; height: 4px; background: var(--sg-line); margin: 4px auto 14px; }
    .sheet h3 { margin: 0 0 3px; font-family: var(--font-head); color: var(--sg-navy); font-size: 1.2rem; }
    .sheet .sheet-sub { margin: 0 0 16px; font-size: 0.86rem; color: var(--sg-muted); }
    .sheet-opt { display: flex; gap: 12px; align-items: center; width: 100%; text-align: left; padding: 14px; border: 1.5px solid var(--sg-line); border-radius: var(--r-sm); margin-bottom: 9px; background: var(--sg-white); cursor: pointer; font-family: inherit; transition: border-color .15s, background .15s; }
    .sheet-opt.on { border-color: var(--sg-blue); background: var(--sg-wash); box-shadow: 0 0 0 3px rgba(23,105,161,.12); }
    .radio-dot { width: 20px; height: 20px; border: 2px solid #c4d2dc; border-radius: 50%; flex-shrink: 0; position: relative; }
    .sheet-opt.on .radio-dot { border-color: var(--sg-blue); }
    .sheet-opt.on .radio-dot::after { content: ""; position: absolute; inset: 3px; background: var(--sg-blue); border-radius: 50%; }
    .sheet-opt .choice-body strong { font-size: 0.92rem; }
    .sheet-foot { display: flex; gap: 10px; margin-top: 14px; position: sticky; bottom: 0; background: #fff; padding-bottom: 4px; }
    .sheet-foot .btn { flex: 1; }

    /* Undo toast — lives in footer slot only when active (no empty ghost node) */
    .snack-slot[hidden] { display: none !important; }
    .snack-slot { padding: 0 var(--gutter) 8px; }
    .snack-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: var(--sg-navy);
      color: var(--sg-white);
      font-size: 0.88rem;
      border-radius: var(--r-sm);
    }
    .snack-undo {
      margin-left: auto;
      background: none;
      border: none;
      color: #ffb27a;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      font-size: 0.88rem;
      padding: 0;
    }

    .hidden { display: none !important; }

    @media (min-width: 481px) {
      body {
        background: #eef3f8;
        display: flex;
        align-items: stretch;
        justify-content: center;
      }
      .app {
        height: 100%;
        border: 1px solid var(--sg-line);
        border-radius: var(--r-lg);
        box-shadow: var(--sh);
      }
      .header { border-radius: var(--r-lg) var(--r-lg) 0 0; }
      .footer { border-radius: 0 0 var(--r-lg) var(--r-lg); }
    }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <a class="logo" href="https://safeguardsecurity.com.au" aria-label="Safeguard Security Services">
        <img class="logo-img" src="../brand/logo-horizontal.png" alt="Safeguard Security Services" width="150" height="30"
             onerror="this.style.display='none';document.getElementById('logo-fb').style.display='flex';" />
        <span class="logo-fb" id="logo-fb" style="display:none">
          <svg class="mk" viewBox="0 0 32 36" fill="none" aria-hidden="true">
            <path d="M16 1 30 6v11c0 9-6 15-14 18C8 32 2 26 2 17V6L16 1Z" fill="#0C2D44"/>
            <path d="M16 1 30 6v11c0 9-6 15-14 18V1Z" fill="#1769A1"/>
            <path d="M10 17l4 4 8-8" stroke="#FB7523" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="tx"><b>Safeguard</b><small>Security Services</small></span>
        </span>
      </a>
      <a class="header-phone" href="tel:1300225276">
        <span class="ph-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h4l2 5-3 2a12 12 0 0 0 5 5l2-3 5 2v4a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2z"/></svg></span>
        <span class="ph-tx"><small>Speak to an expert</small><strong>1300 225 276</strong></span>
      </a>
    </header>

    <div class="progress-wrap" id="prog">
      <div class="progress-meta">
        <span class="step-name" id="prog-label">Start</span>
        <span id="prog-step">Step 1 of 7</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:14%"></div></div>
    </div>

    <div class="resume hidden" id="resume"></div>
    <main class="main" id="view"></main>

    <footer class="footer" id="foot">
      <div id="snack-slot" class="snack-slot" hidden></div>
      <div class="footer-inner">
        <button type="button" class="btn btn-back hidden" id="back">Back</button>

function buildKitFromWizard() {

  } else if (S.mode === "upgrade") {

}

function closeSheet() { document.getElementById("modal").innerHTML = ""; }
function bindPicks(setPick) {
  document.querySelectorAll("[data-pick]").forEach((b) => { b.onclick = () => { setPick(b.dataset.pick); document.querySelectorAll(".sheet-opt").forEach((o) => o.classList.remove("on")); b.classList.add("on"); }; });
}
function openChange(u) {
  const it = getItem(u); let pick = it.key;
  openSheet("Change device", "Select an alternate model", sheetOpts(PRODUCTS[it.key].alts, it.key), () => {
    if (pick !== it.key) { pushUndo(); it.key = pick; if (!PRODUCTS[pick].colours.includes(it.colour)) it.colour = PRODUCTS[pick].colours[0]; snackbar("Device updated"); }
    closeSheet(); suppressPush = true; render();
  });
  bindPicks((v) => { pick = v; });
}
function openAdd(cat) {
  let pick = ADD[cat][0];
  openSheet("Add device", `Choose a ${CAT[cat].toLowerCase()} device`, sheetOpts(ADD[cat], pick), () => {
    pushUndo(); S.kit.push({ uid: uid(), key: pick, qty: 1, colour: PRODUCTS[pick].colours[0] }); snackbar("Device added");
    closeSheet(); suppressPush = true; render();
  });
  bindPicks((v) => { pick = v; });
}
function pushUndo() { undoKit = JSON.stringify(S.kit); }
function hideSnack() {
  clearTimeout(snackTimer);
  const slot = document.getElementById("snack-slot");
  if (slot) {
    slot.innerHTML = "";
    slot.hidden = true;
  }
}
function snackbar(msg) {
  const slot = document.getElementById("snack-slot");
  if (!slot) return;
  slot.hidden = false;
  slot.innerHTML = `<div class="snack-bar"><span>${msg}</span><button type="button" class="snack-undo">Undo</button></div>`;
  slot.querySelector(".snack-undo").onclick = () => {
    if (undoKit) S.kit = JSON.parse(undoKit);
    undoKit = null;
    hideSnack();
    suppressPush = true;
    render();
  };
  clearTimeout(snackTimer);
  snackTimer = setTimeout(hideSnack, 4000);
}
function bindCounters() {
  view().querySelectorAll("[data-cnt]").forEach((b) => {
    b.onclick = () => {
      const k = b.dataset.cnt, d = Number(b.dataset.d);
      const min = k === "windows" || k === "fobs" ? 0 : 1, max = k === "fobs" ? 8 : 20;
      S[k] = Math.max(min, Math.min(max, S[k] + d));
      const el = document.getElementById("n-" + k); if (el) el.textContent = S[k];
      const dec = b.parentElement.querySelector('[data-d="-1"]'); if (dec) dec.disabled = S[k] <= min;
      save();
    };
  });
  view().querySelectorAll('[data-cnt][data-d="-1"]').forEach((b) => { const k = b.dataset.cnt, min = k === "windows" || k === "fobs" ? 0 : 1; b.disabled = S[k] <= min; });
}
function bindToggles() { view().querySelectorAll("[data-tgl]").forEach((i) => { i.onchange = () => { S[i.dataset.tgl] = i.checked; save(); }; }); }

const emailOk = (v) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test((v || "").trim());
function grabContact() {
  const g = (id) => { const e = document.getElementById(id); return e ? (e.type === "checkbox" ? e.checked : e.value.trim()) : ""; };
  S.contact = { first: g("f-first"), last: g("f-last"), email: g("f-email"), phone: g("f-phone"), consent: g("f-consent") };
}
function submit() {
  grabContact();
  const ok = emailOk(S.contact.email);
  const em = document.getElementById("f-email");
  if (em) { em.classList.toggle("bad", !ok); document.getElementById("e-email").classList.toggle("hidden", ok); if (!ok) { em.focus(); return; } }
  document.getElementById("e-consent").classList.toggle("hidden", S.contact.consent);
  if (!S.contact.consent) return;
  const c = { ...S.contact }; resetAll(); rSuccess(c);
}

/* ---- shell ---- */
function render() {
  renderProgress(); renderResume();
  const id = flow()[S.i][0];
  ({ start: rStart, property: rProperty, openings: rOpenings, motion: rMotion, extras: rExtras, review: rReview, contact: rContact }[id])();
  document.getElementById("back").classList.toggle("hidden", S.i === 0);
  const nx = document.getElementById("next");
  nx.textContent = id === "contact" ? "Send my quote →" : "Continue →";
  nx.disabled = (id === "start" && !S.startPicked) || (id === "property" && !S.property);
  save();
  if (!suppressPush) history.pushState({ app: true, i: S.i, mode: S.mode }, "");
  suppressPush = false;
  const mainEl = document.getElementById("view");
  if (mainEl) mainEl.scrollTop = 0;
}
function renderProgress() {
  const f = flow();
  document.getElementById("prog-step").textContent = `Step ${S.i + 1} of ${f.length}`;
  document.getElementById("prog-label").textContent = f[S.i][1];
  document.getElementById("prog-fill").style.width = `${((S.i + 1) / f.length) * 100}%`;
}
function renderResume() {
  const r = document.getElementById("resume");
  if (justResumed && S.i > 0) {
    r.classList.remove("hidden");
    r.innerHTML = `<div class="resume-bar"><span class="rc">${ICONS.check}</span><span>Welcome back — your progress was saved.</span><button type="button" id="ro">Start over</button></div>`;
    document.getElementById("ro").onclick = () => { resetAll(); suppressPush = true; render(); };
  } else r.classList.add("hidden");
}
function go(i) { S.i = i; render(); }
function advance() { if (S.i < flow().length - 1) go(S.i + 1); }
function forward() { const nx = flow()[S.i + 1]; if (nx && nx[0] === "review") buildKitFromWizard(); advance(); }

document.getElementById("next").onclick = () => { justResumed = false; const id = flow()[S.i][0]; if (id === "contact") { submit(); return; } forward(); };
document.getElementById("back").onclick = () => { justResumed = false; history.back(); };
window.addEventListener("popstate", (e) => {
  if (document.getElementById("modal").innerHTML) { closeSheet(); return; }
  if (e.state && e.state.app) { S.mode = e.state.mode; S.i = e.state.i; justResumed = false; suppressPush = true; render(); }
});

load();
history.replaceState({ app: true, i: S.i, mode: S.mode }, "");
suppressPush = true;
render();
</script>
</body>
</html>
